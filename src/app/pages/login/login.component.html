<div class="wrapper wrapper-full-page">
    <div class="full-page login-page" data-color="purple" data-image="../../../assets/img/full-screen-image-1.jpg">

    <!--   you can change the color of the filter page using: data-color="blue | azure | green | orange | red | purple" -->
        <div class="content">
            <div class="container">
                <div class="row">
                    <div class="col-md-4 col-sm-6 col-md-offset-4 col-sm-offset-3">
                        <form method="#" action="#">

                        <!--   if you want to have the card without animation please remove the ".card-hidden" class   -->
                            <div class="card card-hidden">
                                <div class="header text-center" style="padding-bottom: 20px;">

                                    <img style="width: 100px; border-radius: 8px;" src="../../assets/img/LogoBennuu.png"/>

                                </div>
                                <div class="content">
                                    <div class="form-group">
                                        <label>Email address</label>
                                        <input type="email" placeholder="Enter email" class="form-control" [(ngModel)]="email" name="email">
                                    </div>
                                    <div class="form-group">
                                        <label>Password</label>
                                        <input type="password" placeholder="Password" class="form-control" [(ngModel)]="password" name="password">
                                    </div>
                                    
                                    <!-- <div class="form-group">
                                        <div class="checkbox">
                                            <input id="checkbox21" type="checkbox" [checked]="terminos_condiciones" (click)="terminos_condicionesSel()">
                                            <label for="checkbox21">
                                                <a href="javascript:void(0)" (click)="TerminosCondiciones()" style="margin-left: 10px;"><small>Términos y Condiciones</small></a>
                                            </label>
                                        </div>
                                    </div> -->

                                    <div class="form-group">
                                        <div class="checkbox">
                                            <input id="checkbox22" type="checkbox" [checked]="aviso_privacidad" (click)="aviso_privacidadSel()">
                                            <label for="checkbox22">
                                                <a href="javascript:void(0)" (click)="AvisoPrivacidad()" style="margin-left: 10px;"><small>Aviso de Privacidad</small></a>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="footer text-center">
                                    <button type="submit" class="btn btn-fill btn-danger btn-wd" (click)="aIngresar()" [disabled]="email == '' || password == ''">Login</button>
                                </div>
                                <div >
                                    
                                    <a href="javascript:void(0)" (click)="irEmailPass()" style="margin-left: 14px;"><small>Restaurar contraseña</small></a>
                                    
                                </div>
                                
                            </div>
                            <!-- <div *ngIf="show" class="text-right" style="margin-top: -5px;">
                                <a href="javascript:void(0)" (click)="Register()"><small style="color: #eee !important;">Crear cuenta</small></a>
                            </div> -->
                            

                        </form>

                    </div>
                </div>
                <div *ngIf="show" class="row">
                    <div class="col-md-4 col-sm-6 col-md-offset-4 col-sm-offset-3">
                        <button type="button" class="btn btn-fill btn-round btn-danger btn-wd" style="width: 100%;" (click)="Register()">Crear cuenta</button>
                    </div>
                </div>
            </div>
        </div>
