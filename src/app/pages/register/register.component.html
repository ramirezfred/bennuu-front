                    <div class="col-md-6 col-md-offset-3">
                        <form autocomplete="off" [formGroup]="myForm">
                            <div class="card card-plain">
                                <div class="content">
                                    <div class="form-group">
                                        <input type="text" placeholder="Nombre" class="form-control" formControlName="nombre" [class.error]="nombreNoValido">
                                        <small *ngIf="nombreNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="number" placeholder="Edad" class="form-control" min="1" formControlName="edad" [class.error]="edadNoValido">
                                        <small *ngIf="edadNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="text" placeholder="Teléfono" class="form-control" formControlName="telefono" [class.error]="telefonoNoValido">
                                        <small *ngIf="telefonoNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <!-- <input type="text" placeholder="Nivel de estudios" class="form-control" formControlName="nivel_estudios" [class.error]="nivel_estudiosNoValido"> -->
                                        <select class="form-control" 
                                                name="_nivel"
                                                formControlName="nivel_estudios">
                                            <option selected="" disabled="">- Nivel de estudios -</option>
                                            <option *ngFor="let item of niveles_estudio" [value]="item.nivel">{{item.nivel}}</option>
                                        </select>
                                        <small *ngIf="nivel_estudiosNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="text" placeholder="Institución de procedencia" class="form-control" formControlName="institucion" [class.error]="institucionNoValido">
                                        <small *ngIf="institucionNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="email" placeholder="Email" class="form-control" formControlName="email" [class.error]="emailNoValido">
                                        <small *ngIf="emailNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="password" placeholder="Password" class="form-control" formControlName="password" [class.error]="passwordNoValido">
                                        <small *ngIf="passwordNoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <input type="password" placeholder="Repertir Password" class="form-control" formControlName="password2" [class.error]="password2NoValido">
                                        <small *ngIf="password2NoValido" class="text-danger">
                                          Campo requerido
                                        </small>
                                    </div>
                                    <div class="form-group">
                                        <div class="checkbox">
                                            <input id="checkbox21" type="checkbox" [checked]="terminos_condiciones" (click)="terminos_condicionesSel()">
                                            <label for="checkbox21">
                                                <a href="javascript:void(0)" (click)="TerminosCondiciones()"><small style="color: #eee !important;">Términos y Condiciones</small></a>
                                            </label>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <div class="checkbox">
                                            <input id="checkbox22" type="checkbox" [checked]="aviso_privacidad" (click)="aviso_privacidadSel()">
                                            <label for="checkbox22">
                                                <a href="javascript:void(0)" (click)="AvisoPrivacidad()"><small style="color: #eee !important;">Aviso de Privacidad</small></a>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="footer text-center">
                                    <button type="submit" class="btn btn-fill btn-danger btn-wd" (click)="aGuardar()">Crear cuenta</button>
                                </div>
                                <!-- <div class="text-right" style="margin-top: -5px;">
                                    <a href="javascript:void(0)" (click)="Ingresar()"><small style="color: #eee !important;">Ingresar</small></a>
                                </div> -->
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
